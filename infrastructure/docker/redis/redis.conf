# Redis configuration for DLM

# Network
bind 0.0.0.0
port 6379

# Persistence (AOF)
appendonly yes
appendfsync everysec
dir /data

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Security (uncomment and set password in production)
# requirepass your_redis_password_here

# Performance
tcp-keepalive 300
timeout 0
